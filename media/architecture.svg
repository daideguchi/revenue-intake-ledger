<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Revenue Intake Ledger architecture</title>
  <desc id="desc">Vercel Next.js app connected to API routes and DynamoDB single-table storage.</desc>
  <rect width="1280" height="720" fill="#f3f7f8"/>
  <rect x="70" y="70" width="1140" height="580" rx="10" fill="#ffffff" stroke="#d8e1e5"/>
  <text x="105" y="125" fill="#172126" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Revenue Intake Ledger</text>
  <text x="105" y="162" fill="#5a6872" font-family="Arial, Helvetica, sans-serif" font-size="18">H0 architecture: the database is the product memory.</text>

  <g>
    <rect x="105" y="235" width="250" height="135" rx="8" fill="#dff3f5" stroke="#92cdd4"/>
    <text x="130" y="280" fill="#0d6b78" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Builder / Judge</text>
    <text x="130" y="314" fill="#35525a" font-family="Arial, Helvetica, sans-serif" font-size="16">Reviews status, evidence,</text>
    <text x="130" y="338" fill="#35525a" font-family="Arial, Helvetica, sans-serif" font-size="16">payout tasks, next actions.</text>
  </g>

  <g>
    <rect x="515" y="205" width="290" height="195" rx="8" fill="#ffffff" stroke="#d8e1e5"/>
    <text x="545" y="252" fill="#172126" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Vercel Next.js</text>
    <text x="545" y="288" fill="#5a6872" font-family="Arial, Helvetica, sans-serif" font-size="16">Dashboard</text>
    <text x="545" y="316" fill="#5a6872" font-family="Arial, Helvetica, sans-serif" font-size="16">/api/health</text>
    <text x="545" y="344" fill="#5a6872" font-family="Arial, Helvetica, sans-serif" font-size="16">/api/opportunities</text>
    <text x="545" y="372" fill="#5a6872" font-family="Arial, Helvetica, sans-serif" font-size="16">/api/evidence + payout tasks</text>
  </g>

  <g>
    <rect x="945" y="205" width="230" height="195" rx="8" fill="#fff1d3" stroke="#e7bc62"/>
    <text x="975" y="252" fill="#9b5d00" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">DynamoDB</text>
    <text x="975" y="288" fill="#5a4a2d" font-family="Arial, Helvetica, sans-serif" font-size="16">Single table</text>
    <text x="975" y="316" fill="#5a4a2d" font-family="Arial, Helvetica, sans-serif" font-size="16">opportunities</text>
    <text x="975" y="344" fill="#5a4a2d" font-family="Arial, Helvetica, sans-serif" font-size="16">evidence_items</text>
    <text x="975" y="372" fill="#5a4a2d" font-family="Arial, Helvetica, sans-serif" font-size="16">payout_tasks</text>
  </g>

  <path d="M365 302 H500" stroke="#0d6b78" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M815 302 H930" stroke="#0d6b78" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M930 335 H815" stroke="#9b5d00" stroke-width="4" fill="none" marker-end="url(#arrow2)"/>

  <rect x="190" y="485" width="900" height="92" rx="8" fill="#f9e3e1" stroke="#e0a3a0"/>
  <text x="220" y="526" fill="#a23b3b" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Submission boundary</text>
  <text x="220" y="558" fill="#5a4040" font-family="Arial, Helvetica, sans-serif" font-size="17">Preview-seed is not enough. Final H0 proof requires live DynamoDB readback and AWS storage configuration screenshot.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0d6b78"/>
    </marker>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#9b5d00"/>
    </marker>
  </defs>
</svg>
