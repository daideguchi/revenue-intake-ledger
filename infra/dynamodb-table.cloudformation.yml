AWSTemplateFormatVersion: "2010-09-09"
Description: Minimal DynamoDB table for Revenue Intake Ledger H0 proof.

Parameters:
  TableName:
    Type: String
    Default: RevenueIntakeLedger
  EnablePointInTimeRecovery:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Keep false for the lowest-risk H0 proof table unless DD explicitly approves PITR.

Conditions:
  UsePointInTimeRecovery: !Equals [!Ref EnablePointInTimeRecovery, "true"]

Resources:
  RevenueIntakeLedgerTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: !If [UsePointInTimeRecovery, true, false]
      Tags:
        - Key: project
          Value: revenue-intake-ledger
        - Key: hackathon
          Value: h0-zero-stack
        - Key: cost_policy
          Value: no-out-of-pocket

Outputs:
  TableName:
    Value: !Ref RevenueIntakeLedgerTable
  TableArn:
    Value: !GetAtt RevenueIntakeLedgerTable.Arn
